<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduClass — Profesor</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

<style>
:root {
  --bg:#f5f3ef;
  --surface:#fff;
  --primary:#1a472a;
  --primary-light:#2d6a4f;
  --accent:#f4a261;
  --text:#1c1c1c;
  --text-muted:#6b7280;
  --border:#e5e1d8;
  --radius:14px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"DM Sans";
  background:var(--bg);
  color:var(--text);
}

/* TOPBAR */
.topbar{
  height:64px;
  background:#fff;
  display:flex;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid var(--border);
}
.topbar-logo{font-family:"DM Serif Display";font-size:22px;color:var(--primary)}
.topbar-logo span{color:#e76f51}

/* LAYOUT */
.app-body{display:flex}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#fff;
  border-right:1px solid var(--border);
  padding:15px;
  height:calc(100vh - 64px);
}

.sidebar-item{
  padding:10px;
  cursor:pointer;
  border-radius:10px;
}
.sidebar-item:hover{background:#eee}
.sidebar-item.active{background:#d1fae5}

/* MAIN */
.main{flex:1;padding:20px}
.page{display:none}
.page.active{display:block}

/* STATS */
.stats-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}
.stat-card{
  background:#fff;
  padding:15px;
  border-radius:12px;
}

/* CARDS */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
}

.class-card{
  background:#fff;
  border-radius:12px;
  padding:15px;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:400px;
}

.btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.btn-primary{background:var(--primary);color:#fff}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">Edu<span>Class</span></div>
</div>

<div class="app-body">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-item active" onclick="navigate('home')">Inicio</div>
  <div class="sidebar-item" onclick="navigate('classes')">Clases</div>
  <div class="sidebar-item" onclick="navigate('tasks')">Tareas</div>
  <div class="sidebar-item" onclick="navigate('grades')">Notas</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div class="page active" id="page-home">

  <div class="stats-row">
    <div class="stat-card">Clases: <b id="stat-classes">4</b></div>
    <div class="stat-card">Tareas: <b id="stat-tasks">3</b></div>
    <div class="stat-card">Pendientes: <b id="stat-pending">5</b></div>
  </div>

  <h2>Clases</h2>
  <div class="cards-grid" id="home-classes-grid"></div>

</div>

<!-- CLASSES -->
<div class="page" id="page-classes">
  <h2>Mis clases</h2>
  <div class="cards-grid" id="classes-grid"></div>
</div>

<!-- TASKS -->
<div class="page" id="page-tasks">
  <h2>Tareas</h2>
  <button class="btn btn-primary" onclick="openModal('modal-task')">Nueva tarea</button>
</div>

</div>
</div>

<!-- MODAL TASK -->
<div class="modal-overlay" id="modal-task">
  <div class="modal">
    <h3>Nueva tarea</h3>

    <input id="task-title" placeholder="Título"><br><br>
    <input id="task-class" placeholder="Clase"><br><br>

    <button class="btn btn-primary" onclick="createTask()">Crear</button>
    <button class="btn" onclick="closeModal('modal-task')">Cerrar</button>
  </div>
</div>

<script>
let classes = [
  {name:"Física", section:"3A", students:22},
  {name:"Historia", section:"2C", students:30}
];

/* ESCAPE SAFE */
function escapeHTML(str){
  return str.replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",
    '"':"&quot;","'":"&#039;"
  }[m]));
}

/* NAV */
function navigate(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
}

/* RENDER */
function render(){
  const html = classes.map(c=>`
    <div class="class-card">
      <b>${escapeHTML(c.name)}</b><br>
      ${escapeHTML(c.section)} · ${c.students} alumnos
    </div>
  `).join("");

  document.getElementById("classes-grid").innerHTML = html;
  document.getElementById("home-classes-grid").innerHTML = html;

  document.getElementById("stat-classes").textContent = classes.length;
}

/* CREATE TASK */
function createTask(){
  const title = document.getElementById("task-title").value.trim();
  const cls = document.getElementById("task-class").value.trim();

  if(!title || !cls) return alert("Completa campos");

  document.getElementById("stat-tasks").textContent =
    parseInt(document.getElementById("stat-tasks").textContent) + 1;

  closeModal("modal-task");
  render();
}

/* MODAL */
function openModal(id){
  document.getElementById(id).classList.add("open");
}
function closeModal(id){
  document.getElementById(id).classList.remove("open");
}

/* INIT */
render();

</script>

</body>
</html>
