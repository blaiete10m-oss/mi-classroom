<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduClass — Estudiante</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

<style>
:root {
  --bg:#f0f4ff;
  --surface:#fff;
  --primary:#1d4ed8;
  --primary-light:#3b82f6;
  --accent:#f4a261;
  --accent2:#e76f51;
  --text:#1c1c1c;
  --text-muted:#6b7280;
  --border:#dde3f0;
  --card-shadow:0 2px 12px rgba(0,0,0,0.07);
  --radius:14px;
  --danger:#dc2626;
  --success:#16a34a;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;}

/* TOPBAR */
.topbar{height:64px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'DM Serif Display';font-size:22px;color:var(--primary);}
.topbar-logo span{color:var(--accent2);}
.topbar-search{flex:1;max-width:480px;margin:auto;}
.topbar-search input{width:100%;padding:9px 16px 9px 40px;border-radius:24px;border:2px solid var(--border);background:var(--bg);}
.topbar-right{margin-left:auto;display:flex;gap:12px;align-items:center;}
.role-badge{padding:4px 12px;border-radius:20px;background:#dbeafe;color:var(--primary);font-size:12px;font-weight:700;}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}

/* LAYOUT */
.app-body{display:flex;flex:1;}

/* SIDEBAR */
.sidebar{width:240px;background:#fff;border-right:1px solid var(--border);padding:20px 12px;}
.sidebar-item{padding:10px 12px;border-radius:10px;cursor:pointer;}
.sidebar-item:hover{background:var(--bg);}
.sidebar-item.active{background:#dbeafe;color:var(--primary);font-weight:700;}
.sidebar-label{font-size:11px;color:var(--text-muted);padding:10px 12px;}

/* MAIN */
.main{flex:1;padding:28px;}
.page{display:none;}
.page.active{display:block;}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.class-card{background:#fff;border-radius:var(--radius);box-shadow:var(--card-shadow);cursor:pointer;}
.class-card-header{padding:20px;color:#fff;position:relative;}
.class-card-body{padding:20px;font-size:13px;color:var(--text-muted);}
.class-card-footer{display:flex;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);}

/* FEED */
.feed-card{background:#fff;padding:20px;border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--card-shadow);}

/* BUTTON */
.btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:600;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-light);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;padding:30px;border-radius:20px;max-width:520px;width:100%;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;padding:12px 18px;border-radius:10px;opacity:0;transition:.3s;}
.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-logo">Edu<span>Class</span></div>
  <div class="topbar-search"><input placeholder="Buscar..." /></div>
  <div class="topbar-right">
    <span class="role-badge">🎒 Estudiante</span>
    <div class="avatar">E</div>
  </div>
</div>

<div class="app-body">

<nav class="sidebar">
  <div class="sidebar-label">Principal</div>
  <div class="sidebar-item active" onclick="navigate('home')">🏠 Inicio</div>
  <div class="sidebar-item" onclick="navigate('classes')">📚 Clases</div>
  <div class="sidebar-item" onclick="navigate('pending')">⏰ Pendientes</div>
  <div class="sidebar-item" onclick="navigate('grades')">🏆 Notas</div>
  <div class="sidebar-item" onclick="navigate('calendar')">📅 Calendario</div>
</nav>

<main class="main">

<!-- HOME -->
<div class="page active" id="page-home">
  <h2>Mis clases</h2>
  <div class="cards-grid" id="home-classes-grid"></div>
</div>

<!-- CLASSES -->
<div class="page" id="page-classes">
  <h2>Clases</h2>
  <div class="cards-grid" id="classes-grid"></div>
</div>

<!-- PENDING -->
<div class="page" id="page-pending">
  <h2>Tareas pendientes</h2>

  <div class="feed-card">
    <h3>Ejercicios cap. 5</h3>
    <p>Física Moderna</p>
    <button class="btn btn-primary" onclick="openModal()">Entregar</button>
  </div>

</div>

<!-- GRADES -->
<div class="page" id="page-grades">
  <h2>Notas</h2>
</div>

<!-- CALENDAR -->
<div class="page" id="page-calendar">
  <h2>Calendario</h2>
</div>

</main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Entregar tarea</h3>
    <textarea style="width:100%;height:100px;margin-top:10px;"></textarea>
    <br><br>
    <button class="btn btn-primary" onclick="submitTask()">Enviar</button>
    <button class="btn" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const classes = [
  { name:'Física', teacher:'Martínez', color:'green', code:'FIS-3A01', icon:'⚛️' },
  { name:'Mate', teacher:'González', color:'blue', code:'MAT-3B01', icon:'📐' }
];

function renderClasses(){
  const html = classes.map(c=>`
    <div class="class-card">
      <div class="class-card-header" style="background:#1d4ed8">
        <b>${c.name}</b><br>${c.teacher}
      </div>
      <div class="class-card-body">📍 Aula</div>
      <div class="class-card-footer">
        <span>${c.code}</span>
      </div>
    </div>
  `).join('');

  document.getElementById("classes-grid").innerHTML = html;
  document.getElementById("home-classes-grid").innerHTML = html;
}

function navigate(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
}

function openModal(){document.getElementById("modal").classList.add("open");}
function closeModal(){document.getElementById("modal").classList.remove("open");}

function submitTask(){
  closeModal();
  showToast("Tarea enviada ✔");
}

function showToast(t){
  const el=document.getElementById("toast");
  el.textContent=t;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2000);
}

renderClasses();
</script>

</body>
</html>
